<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Roche Posay Effaclar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./styles/styles.css">
</head>

<body>
    <div id="es-rc">
        <div id="es-rc-content">
            <div class="es-kv">
                <div class="es-kv__right">
                    <img class="es-kv__right__logo" src="./images/logo-la-roche-posay.png" alt="Logo La Roche Posay">
                    <div class="es-kv__right__text">
                        <p>Wybierz <span class="es-kv__right__text--bold">effaclar</span><br>zalecany <span
                                class="es-kv__right__text--bold">dla skóry<br>z objawami trądziku:<br>pryszczami<br>i
                                zaskórniakami.</span></p>
                    </div>
                    <div class="es-kv__right__no1-wrapper">
                        <img class="es-kv__right__no1" src="./images/no1.png"
                            alt="Numer 1 w rekomendacjach dermatologów w Polsce.">
                        <p class="es-kv__right__disclaimer es-disclaimer">*Badanie rynku dermokosmetyków z udziałem 150
                            dermatologów w Polsce, AplusA, I-IV 2025.</p>
                    </div>
                </div>
                <div class="es-kv__left">
                    <picture class="es-kv__left__img">
                        <source srcset="./images/kv-bg-desktop.jpg" media="(min-width: 1200px)">
                        <img class="es-kv__left__bg" src="./images/kv-bg-mobile.jpg" alt="">
                    </picture>
                    <div class="es-kv__left__bestseller__wrapper">
                        <img class="es-kv__left__bestseller--img" src="./images/kv-bestseller.jpg" alt="">
                        <p class="es-kv__left__bestseller--txt">Nasz bestseller</p>
                    </div>
                    <div class="es-kv__left__tradzik__wrapper">
                        <img class="es-kv__left__tradzik--img" src="./images/kv-tradzik.jpg" alt="">
                        <div class="es-kv__left__tradzik--txt">
                            <p class="es-kv__left__tradzik--txt--ml">Trądzik młodzieńczy</p>
                            <p class="es-kv__left__tradzik--txt--dr">Trądzik dorosłych</p>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>
    <script src="./scripts/script.js"></script>
</body>

</html>
